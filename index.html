    body {

    /* ── Title ───────────────────────────────────── */                                                                                
    .title-wrap {                                                                                                                       
      padding: 40px 0 0;                                                                                                                
      display: flex;                                                                                                                    
      justify-content: center;                                                                                                          
      flex-shrink: 0;                                                                                                                   
    }                                                                                                                                   
    #titleCanvas {                                                                                                                      
      display: block;                                                                                                                   
    }                                                                                                                                   
                                                                                                                                        
    /* ── Main display area ───────────────────────── */                                                                                
    .main-area {                                                                                                                        
      flex: 1;                                                                                                                          
      display: flex;                                                                                                                    
      align-items: center;                                                                                                              
      justify-content: center;                                                                                                          
      padding: 32px 24px 24px;                                                                                                          
      position: relative;                                                                                                               
      min-height: 300px;                                                                                                                
    }                                                                                                                                   
                                                                                                                                        
    #computerCanvas,                                                                                                                    
    #artCanvas {                                                                                                                        
      display: block;                                                                                                                   
      transition: opacity 0.35s ease;                                                                                                   
    }                                                                                                                                   
                                                                                                                                        
    #computerCanvas { position: absolute; }                                                                                             
    #artCanvas      { display: block; }                                                                                                 
                                                                                                                                        
    /* ── Controls ────────────────────────────────── */                                                                                
    .controls {                                                                                                                         
      flex-shrink: 0;                                                                                                                   
      width: 100%;                                                                                                                      
      max-width: 680px;                                                                                                                 
      padding: 0 32px 48px;                                                                                                             
      display: flex;                                                                                                                    
      flex-direction: column;                                                                                                           
      align-items: center;                                                                                                              
      gap: 28px;                                                                                                                        
    }                                                                                                                                   
                                                                                                                                        
    /* Input */                                                                                                                         
    .input-wrap {                                                                                                                       
      width: 100%;                                                                                                                      
      position: relative;                                                                                                               
    }                                                                                                                                   
    .input-wrap::after {                                                                                                                
      content: '';                                                                                                                      
      position: absolute;                                                                                                               
      bottom: 0; left: 0; right: 0;                                                                                                     
      height: 1px;                                                                                                                      
      background: #2a2a2a;                                                                                                              
      transition: background 0.2s;                                                                                                      
    }                                                                                                                                   
    .input-wrap:focus-within::after {                                                                                                   
      background: #666;                                                                                                                 
    }                                                                                                                                   
    input[type="text"] {                                                                                                                
      background: transparent;                                                                                                          
      border: none;                                                                                                                     
      outline: none;                                                                                                                    
      color: #fff;                                                                                                                      
      font-family: inherit;                                                                                                             
      font-size: 12px;                                                                                                                  
      letter-spacing: 5px;                                                                                                              
      text-transform: uppercase;                                                                                                        
      width: 100%;                                                                                                                      
      padding: 0 0 14px;                                                                                                                
      caret-color: #fff;                                                                                                                
    }                                                                                                                                   
    input::placeholder {                                                                                                                
      color: #1f1f1f;                                                                                                                   
      letter-spacing: 5px;                                                                                                              
    }                                                                                                                                   
                                                                                                                                        
    /* Options row */                                                                                                                   
    .options-row {                                                                                                                      
      display: flex;                                                                                                                    
      gap: 48px;                                                                                                                        
      flex-wrap: wrap;                                                                                                                  
      justify-content: center;                                                                                                          
      align-items: flex-start;                                                                                                          
    }

      const lineH    = ROWS * STEP - GAP;                                                                                               
      const lineGapH = LINE_GAP * STEP;                                                                                                 
      const cw       = maxCols * STEP + PAD * 2;                                                                                        
      const ch       = words.length * lineH + (words.length - 1) * lineGapH + PAD * 2;                                                  
                                                                                                                                        
      artCanvas.width  = Math.max(cw, 200);                                                                                             
      artCanvas.height = Math.max(ch, 100);                                                                                             
      aCtx.fillStyle = '#000';                                                                                                          
      aCtx.fillRect(0, 0, artCanvas.width, artCanvas.height);                                                                           
                                                                                                                                        
      let li = 0, baseY = PAD;                                                                                                          
      for (const word of words) {                                                                                                       
        li = drawTextLine(aCtx, word, PAD, baseY, STEP, PIXEL, RADIUS, li);

      }

  // ── Main area sizing: keep computer canvas centered ────────────────────────                                                        
  function sizeMainArea() {                                                                                                             
    const mainArea = document.getElementById('mainArea');                                                                               
    // Set min-height to match computer canvas height so layout doesn't jump                                                            
    mainArea.style.minHeight = (computerCanvas.height + 64) + 'px';                                                                     
  }                                                                                                                                     
                                                                                                                                        
  // ── Events ────────────────────────────────────────────────────────────────                                                         
  document.getElementById('textInput').addEventListener('input', renderArt);                                                            
                                                                                                                                        
  document.querySelectorAll('[data-color]').forEach(btn => {                                                                            
    btn.addEventListener('click', () => {                                                                                               
      document.querySelectorAll('[data-color]').forEach(b => b.classList.remove('active'));                                             
      btn.classList.add('active');                                                                                                      
      colorMode = btn.dataset.color;                                                                                                    
      renderArt();                                                                                                                      
    });                                                                                                                                 
  });                                                                                                                                   
                                                                                                                                        
  document.querySelectorAll('[data-layout]').forEach(btn => {                                                                           
    btn.addEventListener('click', () => {                                                                                               
      document.querySelectorAll('[data-layout]').forEach(b => b.classList.remove('active'));                                            
      btn.classList.add('active');                                                                                                      
      layoutMode = btn.dataset.layout;                                                                                                  
      renderArt();                                                                                                                      
    });                                                                                                                                 
  });                                                                                                                                   
                                                                                                                                        
  document.getElementById('dlBtn').addEventListener('click', () => {                                                                    
    const link    = document.createElement('a');                                                                                        
    link.download = 'pixel-word-art.png';                                                                                               
    link.href     = artCanvas.toDataURL('image/png');                                                                                   
    link.click();                                                                                                                       
  });                                                                                                                                   
                                                                                                                                        
  // ── Init ──────────────────────────────────────────────────────────────────                                                         
  renderTitle();                                                                                                                        
  renderComputer();                                                                                                                     
  sizeMainArea();                                                                                                                       
  renderArt();                                                                                                                          
  </script>                                                                                                                             
  </body>                                                                                                                               
  </html>
